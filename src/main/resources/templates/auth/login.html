<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Connexion - Gestion Clinique</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/auth.css}">
	<link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-5 col-lg-4">
				<div class="card login-card">
					<div class="card-body">
						<div class="login-header">
							<h1>🏥 CLINIQUE</h1>
							<p>Système de Gestion Clinique</p>
						</div>

						<div class="alert alert-success" th:if="${param.logout}">
							✅ Vous avez été déconnecté avec succès.
						</div>
						<div class="alert alert-danger" th:if="${param.error}">
							❌ Identifiants invalides. Veuillez réessayer.
						</div>

						<form th:action="@{/login}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

							<div class="mb-3">
								<label class="form-label">
									<i class="fas fa-user"></i> Nom d'utilisateur
								</label>
								<input class="form-control" type="text" name="username" autocomplete="username" placeholder="Entrez votre identifiant" required>
							</div>
							<div class="mb-3">
								<label class="form-label">
									<i class="fas fa-lock"></i> Mot de passe
								</label>
								<input class="form-control" type="password" name="password" autocomplete="current-password" placeholder="Entrez votre mot de passe" required>
							</div>
							<button class="btn btn-login btn-primary w-100 text-white" type="submit">
								<i class="fas fa-sign-in-alt"></i> Se connecter
							</button>
						</form>

						<div class="divider"></div>
						
						<div class="credentials-info">
							<small class="d-block mb-2"><strong>Identifiants de test :</strong></small>
							<small>
								<div><i class="fas fa-user-shield"></i> <strong>Admin:</strong> <code>admin</code> / <code>admin123</code></div>
								<div><i class="fas fa-user-circle"></i> <strong>Patient:</strong> <code>patient</code> / <code>patient123</code></div>
							</small>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
