<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Clinique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <th:block layout:fragment="pageCss"></th:block>
</head>
<body>

    <nav class="navbar navbar-expand-lg app-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" sec:authorize="!hasRole('PATIENT')" th:href="@{/dashboard}">
                <span class="brand-mark"><i class="fas fa-hospital-user"></i></span>
                <span>Clinique App</span>
            </a>
            <a class="navbar-brand" sec:authorize="hasRole('PATIENT')" th:href="@{/patient/rdv/new}">
                <span class="brand-mark"><i class="fas fa-hospital-user"></i></span>
                <span>Clinique App</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="navbar-nav ms-auto">
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle user-menu" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-2"></i>
                        <span th:text="${#authentication != null ? #authentication.name : 'Utilisateur'}">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Profil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-3">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-link p-0 text-danger">Déconnexion</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="wrapper">
        <nav id="sidebar" class="d-none d-md-block">
            <div class="sidebar-panel">
                <div class="sidebar-kicker">Navigation</div>
                <ul class="nav flex-column">
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','SECRETAIRE')">
                        <a class="nav-link" th:classappend="${currentPath == '/dashboard'} ? ' active'"
                           th:href="@{/dashboard}"><i class="fas fa-chart-line me-2"></i>Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','SECRETAIRE')">
                        <a class="nav-link" th:classappend="${#strings.startsWith(currentPath, '/patients')} ? ' active'"
                           th:href="@{/patients/list}"><i class="fas fa-users me-2"></i>Patients</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','SECRETAIRE')">
                        <a class="nav-link" th:classappend="${#strings.startsWith(currentPath, '/rdv')} ? ' active'"
                           th:href="@{/rdv/list}"><i class="fas fa-calendar-check me-2"></i>Rendez-vous</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${#strings.startsWith(currentPath, '/medecins')} ? ' active'"
                           th:href="@{/medecins/list}"><i class="fas fa-user-doctor me-2"></i>Médecins</a>
                    </li>

                    <li class="nav-item mt-3" sec:authorize="hasRole('ADMIN')">
                        <div class="text-uppercase text-white-50 small px-3">Administration</div>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:classappend="${#strings.startsWith(currentPath, '/admin')} ? ' active'"
                           th:href="@{/admin}"><i class="fas fa-screwdriver-wrench me-2"></i>Admin panel</a>
                    </li>

                    <li class="nav-item mt-3" sec:authorize="hasRole('SECRETAIRE')">
                        <div class="text-uppercase text-white-50 small px-3">Secrétariat</div>
                    </li>

                    <li class="nav-item mt-3" sec:authorize="hasRole('PATIENT')">
                        <div class="text-uppercase text-white-50 small px-3">Espace patient</div>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('PATIENT')">
                        <a class="nav-link" th:classappend="${#strings.startsWith(currentPath, '/patient/rdv')} ? ' active'"
                           th:href="@{/patient/rdv/new}"><i class="fas fa-notes-medical me-2"></i>Réserver un RDV</a>
                    </li>
                </ul>
            </div>
        </nav>

        <main>
            <div class="container-fluid">
                <div class="content-shell" layout:fragment="content"></div>
            </div>
        </main>
    </div>

    <footer class="app-footer mt-auto">
        <div class="container-fluid">
            <div class="footer-inner">
                <div>
                    <strong>Clinique App</strong>
                    <span>Gestion médicale simple et organisée</span>
                </div>
                <span>© 2026 Projet Master Réseaux & Télécoms</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
