<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Connexion</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-md-5">
				<div class="card shadow-sm">
					<div class="card-body p-4">
						<h1 class="h4 mb-3">Connexion</h1>

						<div class="alert alert-success" th:if="${param.logout}">
							Déconnecté.
						</div>
						<div class="alert alert-danger" th:if="${param.error}">
							Identifiants invalides.
						</div>

						<form th:action="@{/login}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

							<div class="mb-3">
								<label class="form-label">Nom d'utilisateur</label>
								<input class="form-control" type="text" name="username" autocomplete="username" required>
							</div>
							<div class="mb-3">
								<label class="form-label">Mot de passe</label>
								<input class="form-control" type="password" name="password" autocomplete="current-password" required>
							</div>
							<button class="btn btn-primary w-100" type="submit">Se connecter</button>
						</form>

						<hr class="my-4">
						<div class="text-muted small">
							Admin: <code>admin</code> / <code>admin123</code><br>
							Patient test: <code>patient</code> / <code>patient123</code><br>
							Après connexion, vous choisissez la page à ouvrir.
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
