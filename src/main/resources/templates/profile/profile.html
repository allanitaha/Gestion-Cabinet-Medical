<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="page-hero">
        <div class="d-flex align-items-center gap-3 flex-wrap">
            <img class="profile-avatar-lg"
                 th:if="${user.profileImageFilename != null}"
                 th:src="@{/profile/image/{filename}(filename=${user.profileImageFilename})}"
                 alt="Image de profil">
            <div class="profile-avatar-lg profile-avatar-placeholder" th:if="${user.profileImageFilename == null}">
                <i class="fas fa-user"></i>
            </div>
            <div>
                <div class="page-eyebrow">Profil</div>
                <h1 class="h2 mb-1 text-white" th:text="${user.username}">Utilisateur</h1>
                <p class="mb-0 text-white-50" th:text="${user.role}">ROLE</p>
            </div>
        </div>
    </div>

    <div class="card modern-card">
        <div class="card-body">
            <div class="alert alert-success" th:if="${successMessage != null}" th:text="${successMessage}">Profil mis a jour.</div>
            <div class="alert alert-danger" th:if="${errorMessage != null}" th:text="${errorMessage}">Erreur.</div>
            <form th:action="@{/profile}" method="post" enctype="multipart/form-data" class="row g-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="col-12">
                    <h2 class="profile-section-title">Options modifiables</h2>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input class="form-control" name="username" th:value="${user.username}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nouveau mot de passe</label>
                    <input class="form-control" name="password" type="password" minlength="6" placeholder="Laisser vide pour garder l'actuel">
                </div>

                <div class="col-md-6" th:if="${user.patient != null || user.medecin != null}">
                    <label class="form-label">Telephone</label>
                    <input class="form-control" name="telephone"
                           th:value="${user.patient != null ? user.patient.telephone : user.medecin.telephone}">
                </div>
                <div class="col-md-6" th:if="${user.patient != null || user.medecin != null}">
                    <label class="form-label">Email</label>
                    <input class="form-control" name="email" type="email"
                           th:value="${user.patient != null ? user.patient.email : user.medecin.email}">
                </div>

                <div class="col-md-8">
                    <label class="form-label">Image de profil</label>
                    <input class="form-control" name="image" type="file" accept="image/png,image/jpeg,image/gif,image/webp">
                </div>
                <div class="col-md-4 d-grid align-items-end">
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-save me-1"></i>Enregistrer
                    </button>
                </div>

                <div class="col-12 mt-4">
                    <h2 class="profile-section-title">Informations du dossier</h2>
                    <p class="profile-section-note mb-0">Ces informations sont gerees par l'administration du cabinet.</p>
                </div>
                <div class="col-md-6" th:if="${user.patient != null || user.medecin != null}">
                    <label class="form-label">Nom</label>
                    <input class="form-control" th:value="${user.patient != null ? user.patient.nom : user.medecin.nom}" readonly>
                </div>
                <div class="col-md-6" th:if="${user.patient != null || user.medecin != null}">
                    <label class="form-label">Prenom</label>
                    <input class="form-control" th:value="${user.patient != null ? user.patient.prenom : user.medecin.prenom}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <input class="form-control" th:value="${user.role}" readonly>
                </div>
                <div class="col-md-6" th:if="${user.patient != null}">
                    <label class="form-label">CIN</label>
                    <input class="form-control" th:value="${user.patient.cin}" readonly>
                </div>
                <div class="col-md-6" th:if="${user.patient != null}">
                    <label class="form-label">Date de naissance</label>
                    <input class="form-control" th:value="${user.patient.dateNaissance}" readonly>
                </div>
                <div class="col-md-6" th:if="${user.medecin != null}">
                    <label class="form-label">Specialite</label>
                    <input class="form-control" th:value="${user.medecin.specialite}" readonly>
                </div>
                <div class="col-md-6" th:if="${user.medecin != null}">
                    <label class="form-label">Numero d'ordre</label>
                    <input class="form-control" th:value="${user.medecin.numeroOrdre}" readonly>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
