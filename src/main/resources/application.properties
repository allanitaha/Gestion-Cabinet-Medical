# --- Configuration de la base MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/cabinet
spring.datasource.username=root
spring.datasource.password=160802

# Driver explicite (évite des warnings Spring Boot)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Paramètres JPA/Hibernate ---
# none = Flyway gère le schéma, Hibernate ne touche rien
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# Formatage du SQL dans les logs (plus lisible)
spring.jpa.properties.hibernate.format_sql=true
# Dialecte explicite MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
# Dossier des scripts SQL (valeur par défaut mais bien de la préciser)
spring.flyway.locations=classpath:db/migration

# --- Thymeleaf ---
# Désactive le cache en dev (les vues se rechargent à chaud)
spring.thymeleaf.cache=false

# --- Spring Security ---
# Désactive le user/password auto-généré (tu gères tes propres users)
spring.security.user.name=admin
spring.security.user.password=admin

# --- Serveur ---
server.port=8080
# Encodage UTF-8 pour les accents français
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# --- Logging ---
logging.level.com.fst.cabinet=DEBUG
logging.level.org.springframework.security=DEBUG

