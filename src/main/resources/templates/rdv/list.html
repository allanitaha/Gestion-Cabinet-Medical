<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<title>Rendez-vous</title>
</head>
<body>
	<div layout:fragment="content">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h1 class="h3 mb-0">Rendez-vous</h1>
		</div>
		<div class="card shadow-sm">
			<div class="card-body">
				<div class="table-responsive">
					<table class="table table-striped align-middle mb-0">
						<thead>
							<tr>
								<th>#</th>
								<th>Date / Heure</th>
								<th>Durée</th>
								<th>Statut</th>
								<th>Patient</th>
								<th>Médecin</th>
								<th>Motif</th>
							</tr>
						</thead>
						<tbody>
							<tr th:if="${rdvs == null || #lists.isEmpty(rdvs)}">
								<td colspan="7" class="text-muted">Aucun rendez-vous.</td>
							</tr>
							<tr th:each="r : ${rdvs}">
								<td th:text="${r.id}">1</td>
								<td th:text="${r.dateHeure}">2026-01-01T10:00</td>
								<td th:text="${r.dureeMinutes} + ' min'">30 min</td>
								<td>
									<span class="badge text-bg-info" th:text="${r.statut}">PLANIFIE</span>
								</td>
								<td th:text="${r.patient != null ? (r.patient.nom + ' ' + r.patient.prenom) : ''}">Patient</td>
								<td th:text="${r.medecin != null ? (r.medecin.nom + ' ' + r.medecin.prenom) : ''}">Médecin</td>
								<td th:text="${r.motif}">Motif</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
