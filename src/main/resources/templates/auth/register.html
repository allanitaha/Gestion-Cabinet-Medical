<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Creer un utilisateur</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
	<nav class="auth-navbar">
		<a class="auth-brand" th:href="@{/}">
			<span><i class="fas fa-hospital-user"></i></span>
			Clinique
		</a>
		<div class="auth-nav-links">
			<a th:href="@{/}">Accueil</a>
			<a th:href="@{/login}">Connexion</a>
			<a class="btn btn-primary text-white" th:href="@{/register}">Creer un utilisateur</a>
		</div>
	</nav>
	<div class="container py-4">
		<div class="row justify-content-center">
			<div class="col-lg-7">
				<div class="card login-card">
					<div class="card-body">
						<div class="login-header">
							<h1><i class="fas fa-user-plus"></i> UTILISATEUR</h1>
							<p>Le compte est patient par defaut. Un profil medecin doit etre accepte par l'admin.</p>
						</div>

						<div class="alert alert-danger" th:if="${param.error != null and param.error[0] != 'numero_ordre_exists'}">
							Verifiez les informations saisies. Le nom d'utilisateur existe peut-etre deja.
						</div>
						<div class="alert alert-danger" th:if="${param.error != null and param.error[0] == 'numero_ordre_exists'}">
							Ce numero d'ordre est deja lie a un compte medecin.
						</div>

						<form th:action="@{/register}" method="post" enctype="multipart/form-data" class="row g-3">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

							<div class="col-md-6">
								<label class="form-label">Nom d'utilisateur</label>
								<input class="form-control" name="username" autocomplete="username" placeholder="ex: sara.benali" required>
							</div>
							<div class="col-md-6">
								<label class="form-label">Mot de passe</label>
								<input class="form-control" name="password" type="password" autocomplete="new-password" minlength="6" required>
							</div>

							<div class="col-12">
								<label class="form-label">Type de compte</label>
								<select class="form-select" id="roleSelect" name="role">
									<option value="PATIENT" selected>Patient</option>
									<option value="MEDECIN">Medecin</option>
								</select>
							</div>

							<div class="col-md-4">
								<label class="form-label">CIN</label>
								<input class="form-control" id="cinInput" name="cin" required>
							</div>
							<div class="col-md-4">
								<label class="form-label">Nom</label>
								<input class="form-control" name="nom" required>
							</div>
							<div class="col-md-4">
								<label class="form-label">Prenom</label>
								<input class="form-control" name="prenom" required>
							</div>

							<div class="col-md-4">
								<label class="form-label">Telephone</label>
								<input class="form-control" name="telephone">
							</div>
							<div class="col-md-4">
								<label class="form-label">Email</label>
								<input class="form-control" name="email" type="email">
							</div>
							<div class="col-md-4">
								<label class="form-label">Date de naissance</label>
								<input class="form-control" name="dateNaissance" type="date">
							</div>

							<div class="col-md-6 medecin-fields d-none">
								<label class="form-label">Specialite</label>
								<input class="form-control" name="specialite">
							</div>
							<div class="col-md-6 medecin-fields d-none">
								<label class="form-label">N ordre</label>
								<input class="form-control" id="numeroOrdreInput" name="numeroOrdre">
							</div>

							<div class="col-12">
								<label class="form-label">Image de profil</label>
								<input class="form-control" name="profileImage" type="file" accept="image/png,image/jpeg,image/gif,image/webp">
							</div>

							<div class="col-12 d-grid gap-2">
								<button class="btn btn-primary btn-login" type="submit">
									<i class="fas fa-check"></i> Creer mon compte
								</button>
								<a class="btn btn-outline-secondary" th:href="@{/login}">
									J'ai deja un compte
								</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
		(function () {
			const roleSelect = document.getElementById("roleSelect");
			const cinInput = document.getElementById("cinInput");
			const numeroOrdreInput = document.getElementById("numeroOrdreInput");
			const medecinFields = document.querySelectorAll(".medecin-fields");
			function syncRoleFields() {
				const isMedecin = roleSelect.value === "MEDECIN";
				medecinFields.forEach((field) => field.classList.toggle("d-none", !isMedecin));
				cinInput.required = !isMedecin;
				numeroOrdreInput.required = isMedecin;
			}
			roleSelect.addEventListener("change", syncRoleFields);
			syncRoleFields();
		})();
	</script>
</body>
</html>
