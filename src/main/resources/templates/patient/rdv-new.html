<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{layout/layout}">
<head>
	<title>Prendre rendez-vous</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/app.css}">
	<link rel="stylesheet" th:href="@{/css/layout.css}">
	<link rel="stylesheet" th:href="@{/css/patient-rdv-new.css}">
</head>
<body>
<div layout:fragment="content" class="rdv-new-page">
	<div class="page-hero rdv-new-hero">
		<h1 class="h3 mb-0 text-white"><i class="fas fa-notes-medical me-2"></i>Prendre rendez-vous</h1>
	</div>

	<div class="alert alert-success" th:if="${param.created}">
		Rendez-vous créé avec succès.
	</div>

	<div class="alert alert-danger" th:if="${param.error}">
		Erreur: <span th:text="${param.error}">error</span>
	</div>

	<div class="card modern-card rdv-new-card">
		<div class="card-body">
			<form th:action="@{/patient/rdv/new}" method="get" class="row g-3 mb-3">
				<div class="col-md-6">
					<label class="form-label">Médecin</label>
					<select class="form-select" name="medecinId" onchange="this.form.submit()">
						<option value="">Tous les médecins</option>
						<option th:each="m : ${medecins}" th:value="${m.id}"
						        th:selected="${selectedMedecinId != null and selectedMedecinId == m.id}"
						        th:text="${m.nom + ' ' + m.prenom + (m.specialite != null ? ' - ' + m.specialite : '')}">
							Médecin
						</option>
					</select>
				</div>
			</form>

			<form th:action="@{/patient/rdv}" method="post" class="row g-3">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

				<div class="col-md-6">
					<label class="form-label">Créneau disponible</label>
					<select class="form-select" name="creneauId" required>
						<option th:if="${creneaux == null || #lists.isEmpty(creneaux)}" value="">
							Aucun créneau disponible
						</option>
						<option th:each="c : ${creneaux}" th:value="${c.id}"
						        th:text="${c.dateHeure + ' — ' + c.medecin.nom + ' ' + c.medecin.prenom + ' (' + c.dureeMinutes + ' min)'}">
							Créneau
						</option>
					</select>
				</div>

				<div class="col-md-6">
					<label class="form-label">Motif</label>
					<input class="form-control" name="motif">
				</div>

				<div class="col-12">
					<button class="btn btn-primary btn-modern" type="submit">Confirmer</button>
				</div>
			</form>
		</div>
	</div>
</div>
</body>
</html>
