<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<title>Patients</title>
	<link rel="stylesheet" th:href="@{/css/patients-list.css}">
</head>
<body>
	<div layout:fragment="content">
		<div class="page-hero d-flex justify-content-between align-items-center flex-wrap gap-2">
			<h1 class="h3 mb-0 text-white"><i class="fas fa-users me-2"></i>Patients</h1>
			<span class="badge bg-primary" th:text="'Total: ' + ${patients?.size() ?: 0}">Total: 0</span>
		</div>

		<div class="card modern-card">
			<div class="card-header">
				<h5 class="mb-0">Liste complète des patients</h5>
			</div>
			<div class="card-body">
				<div class="table-responsive">
					<table class="table table-striped table-modern align-middle mb-0">
						<thead>
							<tr>
								<th style="width: 5%;">#</th>
								<th>CIN</th>
								<th>Nom</th>
								<th>Prénom</th>
								<th>Téléphone</th>
								<th>Email</th>
								<th>Date de naissance</th>
							</tr>
						</thead>
						<tbody>
							<tr th:if="${patients == null || #lists.isEmpty(patients)}">
								<td colspan="7">
									<div class="empty-state">
										<i class="fas fa-inbox"></i>
										<p class="text-muted mb-0">Aucun patient pour le moment</p>
									</div>
								</td>
							</tr>
							<tr th:each="p : ${patients}">
								<td th:text="${p.id}">1</td>
								<td><code th:text="${p.cin}">AA0000</code></td>
								<td class="fw-500" th:text="${p.nom}">Nom</td>
								<td th:text="${p.prenom}">Prénom</td>
								<td>
									<a th:href="'tel:' + ${p.telephone}" th:text="${p.telephone}">0000</a>
								</td>
								<td>
									<a th:href="'mailto:' + ${p.email}" th:text="${p.email}">email@domaine.com</a>
								</td>
								<td th:text="${#dates.format(p.dateNaissance, 'dd/MM/yyyy')}">2000-01-01</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
